<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Профиль</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; padding: 20px; }
        .card { background: white; border-radius: 20px; padding: 40px; width: 100%; max-width: 500px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h1 { text-align: center; margin-bottom: 30px; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; }
        button { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 12px; cursor: pointer; }
        .flash { background: #d4edda; padding: 12px; border-radius: 12px; margin-bottom: 20px; }
        .back { text-align: center; margin-top: 20px; }
        .back a { color: #667eea; text-decoration: none; }
        hr { margin: 20px 0; }
    </style>
</head>
<body>
    <div class="card">
        <h1>👤 Редактирование профиля</h1>
        {% with messages = get_flashed_messages() %}
            {% if messages %}<div class="flash">{{ messages[0] }}</div>{% endif %}
        {% endwith %}
        <form method="post">
            <div class="form-group">
                <label>ФИО:</label>
                <input type="text" name="full_name" value="{{ full_name }}" required>
            </div>
            <div class="form-group">
                <label>Класс:</label>
                <input type="text" name="class" value="{{ class_name }}" required>
            </div>
            <hr>
            <h3>Смена пароля (опционально)</h3>
            <div class="form-group">
                <label>Старый пароль:</label>
                <input type="password" name="old_password">
            </div>
            <div class="form-group">
                <label>Новый пароль:</label>
                <input type="password" name="new_password">
            </div>
            <div class="form-group">
                <label>Повторите новый пароль:</label>
                <input type="password" name="confirm_new">
            </div>
            <button type="submit">Сохранить изменения</button>
        </form>
        <div class="back"><a href="{{ url_for('index') }}">← Вернуться в журнал</a></div>
    </div>
</body>
</html>
